# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    App\Service\OpenWeatherMapService:
        arguments:
            $apiKey: '%env(string:OPENWEATHERMAP_API_KEY)%'

    App\Service\StripeCheckoutService:
        arguments:
            $secretKey: '%env(string:STRIPE_SECRET_KEY)%'
            $currency: '%env(string:STRIPE_CURRENCY)%'
            $displayCurrency: '%env(string:STRIPE_DISPLAY_CURRENCY)%'
            $displayToChargeRate: '%env(float:STRIPE_DISPLAY_TO_CHARGE_RATE)%'

    App\Service\CustomerAiBotService:
        arguments:
            $endpoint: '%env(string:FREE_CHAT_API_URL)%'
            $timeout: '%env(int:FREE_CHAT_TIMEOUT)%'

    App\Service\ReservationWeatherService:
        arguments:
            $latitude: '%env(float:WEATHER_LATITUDE)%'
            $longitude: '%env(float:WEATHER_LONGITUDE)%'

    App\Service\PaymentConfirmationMailer:
        arguments:
            $smtpHost: '%env(string:PHPMAILER_SMTP_HOST)%'
            $smtpPort: '%env(int:PHPMAILER_SMTP_PORT)%'
            $smtpUsername: '%env(string:PHPMAILER_SMTP_USERNAME)%'
            $smtpPassword: '%env(string:PHPMAILER_SMTP_PASSWORD)%'
            $smtpEncryption: '%env(string:PHPMAILER_SMTP_ENCRYPTION)%'
            $fromEmail: '%env(string:PHPMAILER_FROM_EMAIL)%'
            $fromName: '%env(string:PHPMAILER_FROM_NAME)%'

    App\Service\TwilioVoiceCallService:
        arguments:
            $accountSid: '%env(string:TWILIO_ACCOUNT_SID)%'
            $authToken: '%env(string:TWILIO_AUTH_TOKEN)%'
            $fromNumber: '%env(string:TWILIO_FROM_NUMBER)%'

    App\Service\TwilioSmsService:
        arguments:
            $accountSid: '%env(string:TWILIO_ACCOUNT_SID)%'
            $authToken: '%env(string:TWILIO_AUTH_TOKEN)%'
            $fromNumber: '%env(string:TWILIO_FROM_NUMBER)%'

    App\Service\WhatsAppApiService:
        arguments:
            $accountSid: '%env(string:TWILIO_ACCOUNT_SID)%'
            $authToken: '%env(string:TWILIO_AUTH_TOKEN)%'
            $fromNumber: '%env(string:TWILIO_WHATSAPP_FROM)%'
    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
